x-lagoon-project:
  # Lagoon project name (leave `&lagoon-project` when you edit this)
  &lagoon-project aed

x-volumes:
  &default-volumes
  volumes:
    - .:/app:delegated

x-environment:
  &default-environment
    LAGOON_PROJECT: *lagoon-project
    # Route that should be used locally, if you are using pygmy, this route *must* end with .docker.amazee.io
    LAGOON_ROUTE: &default-url http://${COMPOSE_PROJECT_NAME:-drupal-base}.docker.amazee.io
    # Uncomment if you would like to have the system behave like in production
    LAGOON_ENVIRONMENT_TYPE: production
    # Uncomment to enable xdebug and then restart via `docker compose up -d`
    #XDEBUG_ENABLE: "true"
    PHP_APC_SHM_SIZE: 128M

x-user:
  &default-user
  # The default user under which the containers should run. Change this if you are on linux and run with a user other than id `1000`.
  user: '1000'

volumes:
  files:
    {}
  db:
    {}

services:
  cli:
    build:
      context: .
      dockerfile: lagoon/cli.dockerfile
    image: &cli-image ${COMPOSE_PROJECT_NAME:-drupal-base}-cli # this image will be reused as `CLI_IMAGE` in subsequent Docker builds
    labels:
      lagoon.type: cli-persistent
      lagoon.persistent.name: nginx
      lagoon.persistent: /app/web/sites/default/files/
    <<: *default-volumes
    volumes_from:
      - container:amazeeio-ssh-agent
    user: root
    environment:
      << : *default-environment # loads the defined environment variables from the top

  nginx:
    build:
      context: .
      dockerfile: lagoon/nginx.dockerfile
      args:
        CLI_IMAGE: *cli-image
    labels:
      lagoon.type: nginx-php-persistent
      lagoon.persistent: /app/web/sites/default/files/
    ports:
      - "8080" # exposes the port 8080 with a random local port, find it with `docker-compose port nginx 8080`
    << : [*default-volumes, *default-user]
    depends_on:
      - cli
    environment:
      <<: *default-environment
      LAGOON_LOCALDEV_URL: *default-url
    networks:
      - amazeeio-network
      - default

  php:
    build:
      context: .
      dockerfile: lagoon/php.dockerfile
      args:
        CLI_IMAGE: *cli-image
    labels:
      lagoon.type: nginx-php-persistent
      lagoon.name: nginx
      lagoon.persistent: /app/web/sites/default/files/
    <<: [*default-volumes, *default-user]
    depends_on:
      - cli
    environment:
      <<: *default-environment

  mariadb:
    image: uselagoon/mariadb-10.11-drupal:latest
    labels:
      lagoon.type: mariadb
    ports:
      - "3306"
    << : *default-user # uses the defined user from top
    environment:
      <<: *default-environment
    volumes:
      - db:/var/lib/mysql

  redis:
    image: uselagoon/redis-7:latest
    labels:
      lagoon.type: redis
    ports:
      - "6379" # exposes the port 6379 with a random local port, find it with `docker-compose port redis 6379`
    << : *default-user # uses the defined user from top
    environment:
      <<: *default-environment

networks:
  amazeeio-network:
    external: true
